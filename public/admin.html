<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Santri</title>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginArea">
        <h2>Login Admin</h2>
        <input type="text" id="user" placeholder="Username"><br><br>
        <input type="password" id="pass" placeholder="Password"><br><br>
        <button onclick="login()">Masuk</button>
    </div>

    <!-- ADMIN -->
    <div id="adminContent" style="display: none;">
        <h2>Data Pendaftaran Santri</h2>
        <button onclick="logout()">Logout</button>
        <hr>

        <table border="1" cellpadding="10" id="tableSantri">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Gender</th>
                    <th>Hafalan</th>
                    <th>Wali</th>
                    <th>WhatsApp</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        //  LOAD DATA 
        async function loadSantri() {
            try {
                const res = await fetch('/api/admin/santri', {
                    credentials: 'include'
                });

                const data = await res.json();

                if (!res.ok) {
                    document.getElementById('loginArea').style.display = 'block';
                    document.getElementById('adminContent').style.display = 'none';
                    return;
                }

                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';

                const tbody = document.querySelector('#tableSantri tbody');
                tbody.innerHTML = '';

                data.forEach(item => {
                    const row = `
                        <tr>
                            <td>${item.nama}</td>
                            <td>${item.gender}</td>
                            <td>${item.hafalan}</td>
                            <td>${item.wali}</td>
                            <td>${item.whatsapp}</td>
                            <td>
                                <button onclick="deleteSantri(${item.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

            } catch (err) {
                console.error(err);
            }
        }

        //  DELETE 
        async function deleteSantri(id) {
            if (!confirm("Yakin mau hapus data ini?")) return;

            try {
                const res = await fetch(`/api/admin/santri/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const data = await res.json();

                alert(data.message || data.error);

                // reload tabel tanpa refresh page
                loadSantri();

            } catch (err) {
                console.error(err);
                alert("Terjadi error saat menghapus");
            }
        }

        //  LOGIN 
        async function login() {
            const formData = new FormData();
            formData.append('username', document.getElementById('user').value);
            formData.append('password', document.getElementById('pass').value);

            const res = await fetch('/api/login', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });

            const data = await res.json();
            alert(data.message);

            if (res.ok) {
                loadSantri();
            }
        }

        //  LOGOUT 
        async function logout() {
            await fetch('/api/logout', {
                credentials: 'include'
            });
            location.reload();
        }

        //  INIT 
        loadSantri();
    </script>

</body>

</html>
