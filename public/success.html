<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Berhasil | PSB Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg {
            background: radial-gradient(circle at center, #f0fdf4 0%, #ffffff 100%);
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-success { animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="animate-success w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center shadow-xl shadow-emerald-200">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-10 shadow-2xl shadow-slate-200/60 border border-slate-50">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">Alhamdulillah!</h1>
            <p class="text-slate-600 leading-relaxed mb-8">
                Data calon santri berhasil kami terima. Silakan tunggu informasi selanjutnya yang akan dikirimkan oleh admin melalui <span class="font-bold text-emerald-600">WhatsApp</span>.
            </p>

            <hr class="border-slate-50 mb-8">

            <div class="space-y-4">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Kunjungi Situs Kami</p>
                <a href="https://ppqita.com" 
                    class="inline-flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-slate-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                    PPQIT AL-MAHIR
                </a>
            </div>
        </div>

        <p class="mt-10 text-slate-400 text-sm font-medium">
            Ada kendala? <a href="#" class="text-indigo-500 hover:underline">Hubungi kami</a>
        </p>
    </div>

</body>
</html>
